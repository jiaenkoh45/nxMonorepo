name: doodoo-fam
services:
  - name: api
    source_dir: /doodoo
    github: 
      repo: https://github.com/jiaenkoh45/nxMonorepo.git
      branch: master
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: node dist/main.js
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    envs:
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: ${web.PUBLIC_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

  - name: web
    source_dir: /
    github:
      repo: https://github.com/jiaenkoh45/nxMonorepo.git
      branch: master
      deploy_on_push: true
    build_command: npm install && npm run build:prod
    run_command: node dist/doodoo-fam/server/server.mjs
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    envs:
      - key: PORT
        value: "8080"
        scope: RUN_AND_BUILD_TIME
